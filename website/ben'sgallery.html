<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ben's Dog Site - Gallery</title>
  <link rel="stylesheet" href="ben.css">
</head>
<body>

  <nav>
    <a href="home.html">🏠 Home</a>
    <a href="ben'sgallery.html" class="active">📸 Photo Gallery</a>
    <a href="benquiz.html">🧠 Ben Quiz</a>
  </nav>

  <header>
    <h1>📸 Ben's Photos</h1>
    <p>Look at this handsome dog!</p>
  </header>

  <div class="paw-banner">🐾 🐾 🐾 🐾 🐾</div>

  <div class="section">
    <h2>Add Photos of Ben</h2>
    <div class="comment-section">
      <p style="margin-bottom:14px; color:#555;">Pick photos from your device to add them to the gallery!</p>
      <input type="file" id="photo-input" accept="image/*" multiple
        style="display:block; margin-bottom:14px; font-family:'Courier New',monospace;">
      <button onclick="addPhotos()">Add to Gallery 📸</button>
    </div>
  </div>

  <div class="section">
    <h2>Ben's Gallery</h2>
    <div class="gallery" id="gallery">
      <div class="gallery-placeholder">🐕</div>
      <div class="gallery-placeholder">🦴</div>
      <div class="gallery-placeholder">🐾</div>
    </div>
  </div>

  <footer>
    <p>🐶 Ben's Official Website &copy; 2026 &nbsp;|&nbsp; Made with ❤️ and lots of treats</p>
  </footer>

  <script src="ben.js"></script>
</body>
</html>
